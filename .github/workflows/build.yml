name: Build

permissions:
  contents: read

on:
  workflow_dispatch:
  pull_request:
    branches:
      - '*'
  push:
    branches:
      - 'main'
      - 'hotfix-*'

concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  build:
    name: 'Build (JDK ${{ matrix.java-version }}, ${{ matrix.os }})'
    runs-on: ${{ matrix.os }}-latest
    strategy:
      fail-fast: false
      matrix:
        os: [ 'ubuntu', 'windows' ]
        java-version: [ '17', '21', '25' ]
    env:
      MATRIX_OS: ${{ matrix.os }}
      MATRIX_JAVA_VERSION: ${{ matrix.java-version }}
      ALLURE_MATRIX_ENV: ${{ matrix.os }}-jdk-${{ matrix.java-version }}
      ALLURE_DUMP_NAME: allure-results-build-${{ matrix.os }}-jdk-${{ matrix.java-version }}
      MVNW_CMD: ${{ matrix.os == 'windows' && '.\\mvnw.cmd' || './mvnw' }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Set up JDK ${{ matrix.java-version }}
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: ${{ matrix.java-version }}
          cache: 'maven'

      - name: Build without tests
        run: ${{ env.MVNW_CMD }} -B --no-transfer-progress -DskipTests clean verify

      - name: Test with Allure
        run: npx -y allure@3 run --config ./allurerc.mjs --rerun 2 --environment="${{ env.ALLURE_MATRIX_ENV }}" --dump="${{ env.ALLURE_DUMP_NAME }}" -- ${{ env.MVNW_CMD }} -B --no-transfer-progress verify

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.ALLURE_DUMP_NAME }}
          path: ./${{ env.ALLURE_DUMP_NAME }}.zip
          if-no-files-found: error

  allure3-smoke:
    name: 'Allure 3 report smoke (JDK 17, ${{ matrix.os }})'
    runs-on: ${{ matrix.os }}-latest
    strategy:
      fail-fast: false
      matrix:
        os: [ 'ubuntu', 'windows' ]
    env:
      MVNW_CMD: ${{ matrix.os == 'windows' && '.\\mvnw.cmd' || './mvnw' }}
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'maven'

      - name: Smoke Allure 3 report and aggregate goals
        run: ${{ env.MVNW_CMD }} -B --no-transfer-progress -Pallure3-smoke -DskipTests verify

      - name: Upload Allure 3 smoke outputs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: allure3-smoke-${{ matrix.os }}-jdk-17
          path: |
            target/invoker-projects/allure3-report/target/site/allure-maven-plugin
            target/invoker-projects/allure3-aggregate/target/site/allure-maven-plugin
            target/invoker-reports
          if-no-files-found: ignore

  report:
    needs: [ build ]
    name: Build and publish report
    runs-on: ubuntu-latest
    if: always()
    permissions:
      contents: read
      pull-requests: write
      checks: write
    env:
      ALLURE_SERVICE_TOKEN: ${{ secrets.ALLURE_SERVICE_TOKEN }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Download Allure dumps
        uses: actions/download-artifact@v8
        continue-on-error: true
        with:
          pattern: allure-results-*
          path: ./
          merge-multiple: true

      - name: Generate and publish Allure report
        run: npx -y allure@3 generate --config ./allurerc.mjs --dump="allure-results-*.zip" --output=./target/allure-report

      - name: Post Allure summary
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == false
        uses: allure-framework/allure-action@v0
        with:
          report-directory: ./target/allure-report
          github-token: ${{ secrets.GITHUB_TOKEN }}
