name: Build

permissions: {}

on:
  pull_request:
    branches:
      - '*'
  push:
    branches:
      - 'main'
      - 'hotfix-*'

jobs:
  build:
    name: "Build (${{ matrix.os }}, JDK ${{ matrix.java-version }})"
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ ubuntu-latest, windows-latest ]
        java-version: [ '8.0.x', '11.0.x', '17.0.x' ]
    steps:
      - uses: actions/checkout@v6.0.2
      - name: Set up JDK ${{ matrix.java-version }}
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: ${{ matrix.java-version }}
      - name: Maven Build
        if: runner.os != 'Windows'
        run:  ./mvnw -Dmaven.test.failure.ignore=true clean verify --no-transfer-progress
      - name: Maven Build
        if: runner.os == 'Windows'
        shell: cmd
        run: mvnw.cmd -Dmaven.test.failure.ignore=true clean verify --no-transfer-progress
